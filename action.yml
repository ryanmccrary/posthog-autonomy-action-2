name: 'PreHog'
description: 'Proactively suggests and creates missing PostHog instrumentation for new features in a PR.'
author: 'PostHog'
branding:
  icon: 'activity'
  color: 'orange'

inputs:
  github-token:
    description: 'GITHUB_TOKEN with pull-request: write'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key used for semantic PR analysis.'
    required: true
  posthog-personal-api-key:
    description: 'PostHog personal API key with project access (read events, write insights/dashboards/flags).'
    required: true
  posthog-host:
    description: 'PostHog host (e.g. https://us.posthog.com, https://eu.posthog.com, or self-hosted).'
    required: false
    default: 'https://us.posthog.com'
  posthog-project-id:
    description: 'Numeric PostHog project (team) id to scope reviews against.'
    required: true
  posthog-mcp-url:
    description: 'PostHog MCP JSON-RPC endpoint. Default: https://mcp.posthog.com/mcp. Set empty to disable MCP and use REST only.'
    required: false
    default: 'https://mcp.posthog.com/mcp'
  posthog-mcp-token:
    description: 'Optional separate token for the MCP endpoint. Defaults to posthog-personal-api-key.'
    required: false
  enabled-reviewers:
    description: 'Comma-separated list of reviewers to run. One of: analytics, logs, errors, llm, flags.'
    required: false
    default: 'analytics,logs,errors,llm,flags'
  create-resources:
    description: 'If true, proactively create insights / dashboards. If false, suggest only.'
    required: false
    default: 'true'
  insight-budget-small:
    description: 'Max insights to create for a "small" feature.'
    required: false
    default: '3'
  insight-budget-large:
    description: 'Max insights to create for a "large" feature.'
    required: false
    default: '5'
  enable-inline-suggestions:
    description: 'When true, post Greptile-style line-anchored suggestion blocks for mechanical changes (new/extended events, log inserts, error captures, LLM wraps, flag register/gate sites).'
    required: false
    default: 'true'
  suggestion-confidence-threshold:
    description: 'Minimum bot-self-rated confidence (0..1) for a suggestion to be posted inline. Lower-confidence ones fall back to the summary comment.'
    required: false
    default: '0.65'
  suggestion-max:
    description: 'Cap on inline suggestions posted in a single review.'
    required: false
    default: '12'
  slack-bot-token:
    description: 'Optional Slack bot token used to offer a follow-up notification with results.'
    required: false
  model:
    description: 'Anthropic model id.'
    required: false
    default: 'claude-opus-4-7'
  pr-merged:
    description: |
      Set to "true" when the workflow is firing for a merged PR (pull_request
      event with action=closed and pull_request.merged==true). Activates the
      bot's promote-on-merge path:
        1. Scan the merged diff for posthog.capture(...) / property-add
           patterns matching events the bot previously suggested.
        2. POST /event_definitions/ (and /property_definitions/) for each
           match — idempotent, ignores 409 from PostHog when the def
           already exists.
        3. Re-run the analytics reviewer; insights whose Waiting-for prefix
           referenced a now-registered event get updated in place.
        4. Record the merge commit sha in the bot's autonomy-state.
      Wire it from the consumer workflow file (NOT here in action.yml —
      GitHub evaluates github.* expressions inside any action.yml string
      and they fail validation in this context). See the bundled
      .github/workflows/pr-review.yml in the action's repo for the
      ready-to-copy one-liner that derives this from the close event.
    required: false
    default: 'false'

runs:
  using: 'node20'
  main: 'dist/index.js'
